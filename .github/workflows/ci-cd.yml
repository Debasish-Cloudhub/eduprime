name: EduPrime CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eduprime
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: eduprime_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate
        env:
          DATABASE_URL: postgresql://eduprime:test_pass@localhost:5432/eduprime_test

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://eduprime:test_pass@localhost:5432/eduprime_test

      - name: Build backend
        run: cd backend && npm run build
        env:
          DATABASE_URL: postgresql://eduprime:test_pass@localhost:5432/eduprime_test

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.placeholder.com/api/v1

  # ─── Deploy to Railway (main branch only) ───────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy backend
        run: railway up --service eduprime-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend
        run: railway up --service eduprime-frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
